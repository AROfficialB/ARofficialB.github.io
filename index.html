<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lottie JSON ডাউনলোডার</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0b1120 0%, #19223b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 48px;
            padding: 40px 32px;
            max-width: 680px;
            width: 100%;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.6);
            transition: 0.3s;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            color: #f0f4ff;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        h1 span {
            background: #2d3b5a;
            padding: 4px 14px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 500;
            color: #b3c9ff;
        }
        .sub {
            color: #9aaed9;
            font-size: 15px;
            margin-bottom: 28px;
            border-left: 3px solid #4a7cf7;
            padding-left: 16px;
            line-height: 1.5;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .url-input-wrap {
            background: #141d31;
            border-radius: 40px;
            padding: 4px;
            border: 1px solid #2b3a5a;
            transition: 0.3s;
            display: flex;
            align-items: center;
        }
        .url-input-wrap:focus-within {
            border-color: #5c8aff;
            box-shadow: 0 0 0 4px rgba(74, 124, 247, 0.25);
        }
        #jsonUrl {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 20px;
            font-size: 15px;
            color: #e8edff;
            outline: none;
            font-family: 'Segoe UI', monospace;
            letter-spacing: 0.3px;
        }
        #jsonUrl::placeholder {
            color: #5b6f98;
            font-weight: 400;
            letter-spacing: 0.2px;
        }
        .btn-download {
            background: #4a7cf7;
            border: none;
            border-radius: 40px;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            margin: 4px;
        }
        .btn-download:hover {
            background: #3b67d9;
            transform: scale(1.02);
            box-shadow: 0 8px 24px rgba(74, 124, 247, 0.35);
        }
        .btn-download:active {
            transform: scale(0.97);
        }
        .btn-download:disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.3);
        }
        .example-box {
            background: #0f172b;
            border-radius: 24px;
            padding: 14px 18px;
            margin: 20px 0 10px;
            border: 1px solid #26324d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .example-box code {
            color: #b3ccff;
            font-size: 14px;
            word-break: break-all;
            background: #1a253f;
            padding: 6px 14px;
            border-radius: 60px;
            font-family: 'JetBrains Mono', monospace;
        }
        .example-box button {
            background: #2a3860;
            border: none;
            color: #b3ccff;
            padding: 8px 22px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #3b4d7a;
        }
        .example-box button:hover {
            background: #3b4f80;
            color: white;
        }
        .status {
            margin-top: 24px;
            padding: 14px 20px;
            border-radius: 30px;
            background: #10192e;
            border-left: 4px solid #4a7cf7;
            color: #c6d9ff;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 60px;
            transition: 0.25s;
            word-break: break-word;
        }
        .status.error {
            border-left-color: #f75c6b;
            background: #2a1620;
            color: #ffb3b3;
        }
        .status.success {
            border-left-color: #36d399;
            background: #112a22;
            color: #a8f0d0;
        }
        .spinner {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid #2d3f6b;
            border-radius: 50%;
            border-top-color: #5c8aff;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .footer {
            margin-top: 28px;
            color: #4c5f86;
            font-size: 13px;
            text-align: center;
            border-top: 1px solid #1b2845;
            padding-top: 20px;
        }
        .footer a {
            color: #6b8cff;
            text-decoration: none;
        }
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
        }
        @media (max-width: 520px) {
            .card { padding: 28px 18px; }
            .btn-download { width: 100%; justify-content: center; }
            .url-input-wrap { flex-wrap: wrap; background: transparent; padding: 0; border: none; }
            .url-input-wrap:focus-within { box-shadow: none; }
            #jsonUrl { background: #141d31; border-radius: 40px; border: 1px solid #2b3a5a; padding: 16px 20px; }
            .btn-download { margin: 0; border-radius: 40px; }
            .example-box { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>
            📥 Lottie ডাউনলোড
            <span>JSON</span>
        </h1>
        <div class="sub">
            একটি Lottie JSON ফাইলের লিংক দিন — ফাইলটি স্বয়ংক্রিয়ভাবে ডাউনলোড হবে।
        </div>

        <div class="input-group">
            <div class="url-input-wrap">
                <input type="url" id="jsonUrl" placeholder="https://example.com/file.lottie.json" value="https://nft.fragment.com/gift/scaredcat-12339.lottie.json" />
                <button class="btn-download" id="downloadBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    ডাউনলোড
                </button>
            </div>
        </div>

        <!-- উদাহরণ লিংক -->
        <div class="example-box">
            <code>🔗 scaredcat-12339.lottie.json</code>
            <button id="pasteExampleBtn">📋 ব্যবহার করুন</button>
        </div>

        <!-- স্ট্যাটাস/মেসেজ -->
        <div class="status" id="statusMessage">
            <span>⏳</span> লিংক দিন ও ডাউনলোড চাপুন
        </div>

        <div class="footer">
            🔹 ফাইলের নাম URL থেকে নেওয়া হয় &bull; <span id="fileNamePreview">scaredcat-12339.lottie.json</span>
        </div>
    </div>

    <script>
        (function() {
            const urlInput = document.getElementById('jsonUrl');
            const downloadBtn = document.getElementById('downloadBtn');
            const statusDiv = document.getElementById('statusMessage');
            const fileNamePreview = document.getElementById('fileNamePreview');
            const pasteExampleBtn = document.getElementById('pasteExampleBtn');

            // উদাহরণ লিংক বসানোর বাটন
            pasteExampleBtn.addEventListener('click', function() {
                urlInput.value = 'https://nft.fragment.com/gift/scaredcat-12339.lottie.json';
                updateFileNamePreview(urlInput.value);
                setStatus('📋 উদাহরণ লিংক বসানো হয়েছে। এখন ডাউনলোড চাপুন।', '');
                downloadBtn.disabled = false;
            });

            // URL থেকে ফাইলের নাম বের করা (শেষ স্ল্যাশের পর的部分)
            function extractFileNameFromUrl(url) {
                try {
                    const urlObj = new URL(url);
                    const path = urlObj.pathname; // e.g. /gift/scaredcat-12339.lottie.json
                    const segments = path.split('/');
                    let fileName = segments[segments.length - 1];
                    if (!fileName) {
                        // যদি শেষ অংশ ফাঁকা হয়, তাহলে হোস্টনেম ব্যবহার
                        fileName = urlObj.hostname + '.json';
                    }
                    // ডিকোড করা (যেমন %20 → space)
                    fileName = decodeURIComponent(fileName);
                    // নিশ্চিত করা যে .json আছে, না থাকলে যোগ করা
                    if (!fileName.toLowerCase().endsWith('.json')) {
                        fileName += '.json';
                    }
                    return fileName;
                } catch (e) {
                    // URL পার্স করতে না পারলে ডিফল্ট
                    return 'downloaded.lottie.json';
                }
            }

            // প্রিভিউ আপডেট
            function updateFileNamePreview(url) {
                const name = extractFileNameFromUrl(url);
                fileNamePreview.textContent = name;
                return name;
            }

            // স্ট্যাটাস মেসেজ সেট করা
            function setStatus(message, type = '') {
                statusDiv.className = 'status';
                if (type === 'error') {
                    statusDiv.classList.add('error');
                } else if (type === 'success') {
                    statusDiv.classList.add('success');
                }
                // স্পিনার বা আইকন সহ মেসেজ দেখানো
                if (type === 'loading') {
                    statusDiv.innerHTML = `<span class="spinner"></span> ${message}`;
                } else {
                    // এমোজি প্রতিস্থাপন (বেসিক)
                    let icon = 'ℹ️';
                    if (type === 'success') icon = '✅';
                    else if (type === 'error') icon = '❌';
                    else icon = '⏳';
                    statusDiv.innerHTML = `<span>${icon}</span> ${message}`;
                }
            }

            // ডাউনলোড ফাংশন
            async function downloadLottieJson() {
                const url = urlInput.value.trim();
                if (!url) {
                    setStatus('দয়া করে একটি বৈধ URL দিন।', 'error');
                    return;
                }

                // URL ভ্যালিডেশন (সহজ)
                try {
                    new URL(url);
                } catch (_) {
                    setStatus('URL টি সঠিক নয়। "https://" দিয়ে শুরু করুন।', 'error');
                    return;
                }

                // ডাউনলোড বাটন ডিজেবল
                downloadBtn.disabled = true;
                setStatus('ডাউনলোড শুরু হচ্ছে...', 'loading');

                try {
                    // ১. ফেচ করা
                    const response = await fetch(url, {
                        method: 'GET',
                        headers: { 'Accept': 'application/json' }
                    });

                    if (!response.ok) {
                        throw new Error(`সার্ভার থেকে ত্রুটি: ${response.status} ${response.statusText}`);
                    }

                    // ২. JSON কন্টেন্ট পড়া
                    const jsonData = await response.json();

                    // ৩. ফাইলের নাম তৈরি
                    let fileName = extractFileNameFromUrl(url);
                    // যদি নামটা হয় "downloaded.lottie.json" তাহলে ইউআরএল থেকে ভালো নাম বের করার চেষ্টা
                    if (fileName === 'downloaded.lottie.json') {
                        const pathParts = url.split('/');
                        const lastPart = pathParts[pathParts.length - 1].split('?')[0];
                        if (lastPart && lastPart.includes('.')) {
                            fileName = decodeURIComponent(lastPart);
                            if (!fileName.toLowerCase().endsWith('.json')) fileName += '.json';
                        } else {
                            fileName = 'lottie_animation.json';
                        }
                    }
                    updateFileNamePreview(url); // প্রিভিউ আপডেট

                    // ৪. JSON স্ট্রিং তৈরি (pretty print)
                    const jsonString = JSON.stringify(jsonData, null, 2);

                    // ৫. BLOB তৈরি
                    const blob = new Blob([jsonString], { type: 'application/json' });
                    const objectUrl = URL.createObjectURL(blob);

                    // ৬. ডাউনলোড ট্রিগার
                    const link = document.createElement('a');
                    link.href = objectUrl;
                    link.download = fileName;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);

                    // ৭. ক্লিনআপ
                    setTimeout(() => URL.revokeObjectURL(objectUrl), 5000);

                    setStatus(`✅ "${fileName}" ডাউনলোড সম্পূর্ণ! (${(blob.size / 1024).toFixed(1)} KB)`, 'success');
                } catch (error) {
                    console.error('ডাউনলোড ত্রুটি:', error);
                    setStatus(`❌ ডাউনলোড ব্যর্থ: ${error.message}`, 'error');
                } finally {
                    downloadBtn.disabled = false;
                }
            }

            // URL ইনপুটে পরিবর্তন হলে প্রিভিউ আপডেট
            urlInput.addEventListener('input', function() {
                const val = this.value.trim();
                if (val) {
                    updateFileNamePreview(val);
                } else {
                    fileNamePreview.textContent = 'ফাইল নাম এখানে দেখাবে';
                }
                // আগের স্ট্যাটাস রিসেট (যদি error/success থাকে)
                if (statusDiv.classList.contains('error') || statusDiv.classList.contains('success')) {
                    statusDiv.className = 'status';
                    statusDiv.innerHTML = `⏳ লিংক দিন ও ডাউনলোড চাপুন`;
                }
            });

            // ডাউনলোড বাটন ক্লিক
            downloadBtn.addEventListener('click', downloadLottieJson);

            // এন্টার কী সাপোর্ট
            urlInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    downloadBtn.click();
                }
            });

            // পেজ লোড হলে ডিফল্ট উদাহরণ প্রিভিউ আপডেট
            window.addEventListener('DOMContentLoaded', function() {
                const defaultUrl = urlInput.value;
                if (defaultUrl) {
                    updateFileNamePreview(defaultUrl);
                    setStatus('⏳ ডিফল্ট উদাহরণ লিংক প্রস্তুত। ডাউনলোড চাপুন।', '');
                }
                // বাটন সক্রিয়
                downloadBtn.disabled = false;
            });
        })();
    </script>
</body>
</html>
