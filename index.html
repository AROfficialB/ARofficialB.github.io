<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BD Punks - Mobile Downloader</title>

    <!-- JSZip (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js">
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            background-image: radial-gradient(circle at 20% 50%, #1a1a2e 0%, #0a0a0a 100%);
            touch-action: manipulation;
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 30px 24px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9);
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 6px;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 900;
            color: #0a0a0a;
            flex-shrink: 0;
            box-shadow: 0 0 30px rgba(247, 151, 30, 0.2);
        }

        .title-group h1 {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.3px;
        }

        .title-group .sub {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            font-weight: 300;
        }

        /* ===== STATS ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 20px 0 24px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-item .num {
            font-size: 20px;
            font-weight: 700;
            color: #ffd200;
            display: block;
            line-height: 1.2;
        }

        .stat-item .lbl {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-top: 3px;
        }

        /* ===== BUTTON ===== */
        .btn-download {
            width: 100%;
            padding: 16px 20px;
            font-size: 17px;
            font-weight: 700;
            color: #0a0a0a;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            touch-action: manipulation;
            position: relative;
            overflow: hidden;
            min-height: 56px;
        }

        .btn-download:active:not(:disabled) {
            transform: scale(0.96);
        }

        .btn-download:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-download .icon {
            font-size: 20px;
        }

        .spinner-ring {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid rgba(10, 10, 10, 0.15);
            border-top-color: #0a0a0a;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-download.loading .spinner-ring {
            display: inline-block;
        }
        .btn-download.loading .btn-label {
            display: none;
        }
        .btn-download.loading .icon {
            display: none;
        }

        /* ===== PROGRESS ===== */
        .progress-area {
            margin-top: 18px;
            display: none;
        }

        .progress-area.active {
            display: block;
        }

        .progress-track {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            font-weight: 300;
        }

        .progress-info .speed {
            color: #4ade80;
        }

        /* ===== LOG ===== */
        .log-box {
            margin-top: 14px;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            max-height: 110px;
            overflow-y: auto;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            color: rgba(255, 255, 255, 0.35);
            line-height: 1.8;
            display: none;
            -webkit-overflow-scrolling: touch;
        }

        .log-box.active {
            display: block;
        }

        .log-box .entry {
            opacity: 0;
            animation: fadeIn 0.25s ease forwards;
        }

        .log-box .entry.done {
            color: #4ade80;
        }
        .log-box .entry.err {
            color: #f87171;
        }
        .log-box .entry.info {
            color: #60a5fa;
        }
        .log-box .entry.warn {
            color: #fbbf24;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .log-box::-webkit-scrollbar {
            width: 3px;
        }
        .log-box::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 18px;
            text-align: center;
            color: rgba(255, 255, 255, 0.08);
            font-size: 11px;
        }

        /* ===== MOBILE TOAST ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            padding: 14px 24px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            display: none;
            z-index: 999;
            max-width: 90%;
            text-align: center;
            animation: slideUp 0.4s ease;
        }

        .toast.show {
            display: block;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 400px) {
            .container {
                padding: 20px 16px;
            }
            .title-group h1 {
                font-size: 18px;
            }
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 6px;
            }
            .stat-item .num {
                font-size: 17px;
            }
            .btn-download {
                font-size: 15px;
                padding: 14px 16px;
                min-height: 48px;
            }
        }
    </style>
</head>
<body>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <div class="container">

        <!-- HEADER -->
        <div class="header">
            <div class="logo">🦍</div>
            <div class="title-group">
                <h1>BD Punks</h1>
                <div class="sub">মোবাইল ফ্রেন্ডলি ডাউনলোড</div>
            </div>
        </div>

        <!-- STATS -->
        <div class="stats-grid">
            <div class="stat-item">
                <span class="num" id="folderCount">—</span>
                <span class="lbl">ফোল্ডার</span>
            </div>
            <div class="stat-item">
                <span class="num" id="fileCount">—</span>
                <span class="lbl">ফাইল</span>
            </div>
            <div class="stat-item">
                <span class="num" id="sizeDisplay">—</span>
                <span class="lbl">সাইজ</span>
            </div>
        </div>

        <!-- DOWNLOAD BUTTON -->
        <button class="btn-download" id="downloadBtn">
            <span class="icon">📥</span>
            <span class="btn-label">ডাউনলোড সব লেয়ার</span>
            <span class="spinner-ring"></span>
        </button>

        <!-- PROGRESS -->
        <div class="progress-area" id="progressArea">
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-info">
                <span id="progressText">প্রস্তুত হচ্ছে...</span>
                <span class="speed" id="speedText">—</span>
            </div>
        </div>

        <!-- LOG -->
        <div class="log-box" id="logBox"></div>

        <!-- FOOTER -->
        <div class="footer">⚡ মোবাইল অপটিমাইজড · Firebase Storage</div>

    </div>

    <script>
        // ================================================================
        //  ALL LAYERS DATA
        // ================================================================

        const BASE_URL = 'https://firebasestorage.googleapis.com/v0/b/bdpunks.firebasestorage.app/o/';

        const LAYERS = {
            '1_Background': ['Background'],
            '2_Base': ['Male', 'Female', 'Zombie', 'Ape', 'Alien'],
            '3_Nose': ['Clown Nose'],
            '4_Face': ['Spots', 'Mole', 'Rosy Cheeks', 'Frown', 'Smile', 'Buck Teeth', 'Eye Mask', 'Medical Mask',
                'Clown Eyes Blue', 'Clown Eyes Green'
            ],
            '5_Neck': ['Choker', 'Gold Chain', 'Silver Chain'],
            '6_Mouth': ['Smile', 'Frown', 'Black Lipstick', 'Hot Lipstick', 'Purple Lipstick', 'Pipe', 'Cigarette',
                'Vape'
            ],
            '7_Ear': ['Earring'],
            '8_Beard': ['Big Beard', 'Chinstrap', 'Goat', 'Handlebars', 'Luxurious Beard', 'Mustache', 'Muttonchops',
                'Normal Beard', 'Normal Beard Black', 'Shadow Beard', 'Front Beard', 'Front Beard Dark'
            ],
            '9_Accessory': ['Bandana', 'Do-rag', 'Hoodie', 'Eye Patch', 'Medical Mask', 'VR', '3D Glasses',
                'Welding Goggles', 'Cigarette', 'Vape', 'Pipe'
            ],
            '10_Head': ['3D Glasses', 'Bandana', 'Beanie', 'Big Shades', 'Blonde Bob', 'Blonde Short', 'Cap',
                'Cap Forward', 'Clown Hair Green', 'Cowboy Hat', 'Crazy Hair', 'Dark Hair', 'Do-rag', 'Fedora',
                'Frumpy Hair', 'Half Shaved', 'Headband', 'Hoodie', 'Horned Rim Glasses', 'Knitted Cap',
                'Messy Hair', 'Mohawk', 'Mohawk Dark', 'Mohawk Thin', 'Orange Side', 'Peak Spike', 'Pigtails',
                'Pink With Hat', 'Pilot Helmet', 'Police Cap', 'Purple Hair', 'Red Mohawk', 'Shaved Head',
                'Straight Hair', 'Straight Hair Blonde', 'Straight Hair Dark', 'Stringy Hair', 'Tassle Hat',
                'Tiara', 'Top Hat', 'Vampire Hair', 'Wild Blonde', 'Wild Hair', 'Wild White Hair'
            ],
            '11_Eyes': ['Big Shades', 'Classic Shades', 'Clown Eyes Blue', 'Clown Eyes Green', 'Horned Rim Glasses',
                'Nerd Glasses', 'Regular Shades', 'Small Shades', 'VR', '3D Glasses', 'Welding Goggles',
                'Eye Mask', 'Eye Patch', 'Blue Eye Shadow', 'Green Eye Shadow', 'Purple Eye Shadow'
            ]
        };

        function buildFileList() {
            const files = [];
            for (const [folder, items] of Object.entries(LAYERS)) {
                for (const item of items) {
                    const encodedPath = `layers%2F${folder}%2F${item}.png`;
                    files.push({
                        folder: folder,
                        name: item,
                        path: `layers/${folder}/${item}.png`,
                        url: `${BASE_URL}${encodedPath}?alt=media`
                    });
                }
            }
            return files;
        }

        const allFiles = buildFileList();

        // ================================================================
        //  DOM REFS
        // ================================================================
        const btn = document.getElementById('downloadBtn');
        const progressArea = document.getElementById('progressArea');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const speedText = document.getElementById('speedText');
        const logBox = document.getElementById('logBox');
        const folderCountEl = document.getElementById('folderCount');
        const fileCountEl = document.getElementById('fileCount');
        const sizeDisplayEl = document.getElementById('sizeDisplay');
        const toast = document.getElementById('toast');

        let isRunning = false;

        // ================================================================
        //  TOAST (মোবাইলের জন্য)
        // ================================================================
        function showToast(msg, duration = 3000) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), duration);
        }

        // ================================================================
        //  LOG HELPER
        // ================================================================
        function addLog(msg, type = 'info') {
            logBox.classList.add('active');
            const el = document.createElement('div');
            el.className = `entry ${type}`;
            el.textContent = `› ${msg}`;
            logBox.appendChild(el);
            logBox.scrollTop = logBox.scrollHeight;
        }

        // ================================================================
        //  LOAD STATS
        // ================================================================
        function loadStats() {
            const folders = Object.keys(LAYERS).length;
            const files = allFiles.length;
            const estimatedSize = (files * 0.15).toFixed(1);

            folderCountEl.textContent = folders;
            fileCountEl.textContent = files;
            sizeDisplayEl.textContent = estimatedSize + ' MB';

            return { folders, files };
        }

        // ================================================================
        //  DOWNLOAD FUNCTION (মোবাইল ফ্রেন্ডলি)
        // ================================================================
        async function downloadAll() {
            if (isRunning) return;
            isRunning = true;

            btn.disabled = true;
            btn.classList.add('loading');
            progressArea.classList.add('active');
            logBox.innerHTML = '';
            logBox.classList.remove('active');

            progressFill.style.width = '0%';
            progressText.textContent = '⏳ শুরু হচ্ছে...';
            speedText.textContent = '—';

            const startTime = Date.now();
            let downloadedBytes = 0;
            let completedFiles = 0;
            const total = allFiles.length;

            try {
                addLog(`📦 ${total} টি ফাইল ডাউনলোড শুরু`, 'info');

                // মোবাইলে স্টোরেজ পারমিশন চেক
                if (navigator.storage && navigator.storage.estimate) {
                    const estimate = await navigator.storage.estimate();
                    const available = estimate.quota - estimate.usage;
                    const needed = total * 0.15 * 1024 * 1024; // ~150KB per file
                    if (available < needed) {
                        showToast('⚠️ স্টোরেজ স্পেস কম!', 4000);
                        addLog('⚠️ ফোনে স্পেস কম হতে পারে', 'warn');
                    }
                }

                const zip = new JSZip();
                const concurrency = 6; // মোবাইলের জন্য কম
                const queue = [...allFiles];
                let active = 0;

                await new Promise((resolve, reject) => {
                    function next() {
                        if (queue.length === 0 && active === 0) {
                            resolve();
                            return;
                        }

                        while (active < concurrency && queue.length > 0) {
                            const file = queue.shift();
                            active++;

                            fetch(file.url)
                                .then(res => {
                                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                                    return res.blob();
                                })
                                .then(blob => {
                                    zip.file(file.path, blob);
                                    downloadedBytes += blob.size;
                                    completedFiles++;

                                    const elapsed = (Date.now() - startTime) / 1000;
                                    const speed = elapsed > 0 ? downloadedBytes / elapsed : 0;
                                    const pct = Math.round((completedFiles / total) * 100);

                                    progressFill.style.width = pct + '%';
                                    progressText.textContent = `⏳ ${completedFiles}/${total} (${pct}%)`;

                                    const speedStr = speed > 1024 * 1024 ?
                                        (speed / (1024 * 1024)).toFixed(1) + ' MB/s' :
                                        (speed / 1024).toFixed(1) + ' KB/s';
                                    speedText.textContent = speedStr;

                                    if (completedFiles % 10 === 0 || completedFiles === total) {
                                        addLog(`📥 ${completedFiles}/${total} ফাইল`, 'info');
                                    }
                                })
                                .catch(err => {
                                    addLog(`⚠️ ${file.name}: ${err.message}`, 'warn');
                                })
                                .finally(() => {
                                    active--;
                                    next();
                                });
                        }
                    }

                    next();
                });

                progressText.textContent = '📦 জিপ ফাইল তৈরি হচ্ছে...';
                addLog('📦 জিপ আর্কাইভ তৈরি হচ্ছে...', 'info');

                const zipBlob = await zip.generateAsync({ type: 'blob' });

                // ===== মোবাইলের জন্য ডাউনলোড =====
                const zipName = `bdpunks-layers-${new Date().toISOString().slice(0,10)}.zip`;

                // মোবাইল ডাউনলোড (বিকল্প পদ্ধতি)
                if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                    // মোবাইলে 직접 다운로드
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(zipBlob);
                    link.download = zipName;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    setTimeout(() => URL.revokeObjectURL(link.href), 10000);

                    showToast('✅ ডাউনলোড শুরু হয়েছে!', 3000);
                } else {
                    // ডেস্কটপ
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(zipBlob);
                    link.download = zipName;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    setTimeout(() => URL.revokeObjectURL(link.href), 10000);
                }

                const elapsed = (Date.now() - startTime) / 1000;
                const sizeMB = (zipBlob.size / (1024 * 1024)).toFixed(1);

                progressFill.style.width = '100%';
                progressText.textContent = '✅ সম্পূর্ণ!';
                speedText.textContent = `${elapsed.toFixed(1)}s`;

                addLog(`✅ ${zipName} ডাউনলোড সম্পূর্ণ (${sizeMB} MB, ${elapsed.toFixed(1)}s)`, 'done');
                showToast('✅ ডাউনলোড সম্পূর্ণ!', 3000);

            } catch (error) {
                console.error('Download error:', error);
                progressText.textContent = '❌ ব্যর্থ!';
                addLog(`❌ ${error.message}`, 'err');
                showToast('❌ ডাউনলোড ব্যর্থ!', 3000);
            } finally {
                isRunning = false;
                btn.disabled = false;
                btn.classList.remove('loading');
            }
        }

        // ================================================================
        //  EVENT
        // ================================================================
        btn.addEventListener('click', downloadAll);

        // ================================================================
        //  INIT
        // ================================================================
        function init() {
            const stats = loadStats();
            addLog(`✅ ${stats.files} টি ফাইল পাওয়া গেছে`, 'done');
            addLog('📱 মোবাইল ফ্রেন্ডলি মোড', 'info');

            // মোবাইল চেক
            if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                addLog('📱 মোবাইল ডিভাইস ডিটেক্টেড', 'info');
            }
        }

        init();
    </script>

</body>
</html>
