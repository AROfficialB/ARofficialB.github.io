<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BD Punks - Folder Wise Download</title>

    <!-- JSZip -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js">
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            padding: 16px;
            background-image: radial-gradient(circle at 20% 50%, #1a1a2e 0%, #0a0a0a 100%);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 20px 0 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 20px;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 900;
            color: #0a0a0a;
            flex-shrink: 0;
            box-shadow: 0 0 30px rgba(247, 151, 30, 0.2);
        }

        .title-group h1 {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.3px;
        }

        .title-group .sub {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            font-weight: 300;
        }

        /* ===== STATS BAR ===== */
        .stats-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stats-bar .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        .stats-bar .stat .num {
            color: #ffd200;
            font-weight: 700;
            font-size: 16px;
        }

        /* ===== FOLDER GRID ===== */
        .folder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }

        /* ===== FOLDER CARD ===== */
        .folder-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 16px 14px;
            transition: all 0.3s ease;
        }

        .folder-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 215, 0, 0.15);
        }

        .folder-card .folder-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .folder-card .folder-name {
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        .folder-card .folder-name .num {
            color: #ffd200;
            font-weight: 700;
        }

        .folder-card .folder-size {
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
        }

        .folder-card .folder-desc {
            color: rgba(255, 255, 255, 0.25);
            font-size: 12px;
            margin-bottom: 12px;
            padding-left: 2px;
        }

        /* ===== DOWNLOAD BUTTON (per folder) ===== */
        .btn-folder {
            width: 100%;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 600;
            color: #0a0a0a;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            touch-action: manipulation;
            min-height: 44px;
        }

        .btn-folder:active:not(:disabled) {
            transform: scale(0.96);
        }

        .btn-folder:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-folder .icon {
            font-size: 16px;
        }

        .btn-folder .spinner-sm {
            display: none;
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(10, 10, 10, 0.15);
            border-top-color: #0a0a0a;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn-folder.loading .spinner-sm {
            display: inline-block;
        }
        .btn-folder.loading .btn-label {
            display: none;
        }
        .btn-folder.loading .icon {
            display: none;
        }

        /* ===== PROGRESS (per folder) ===== */
        .folder-progress {
            margin-top: 10px;
            display: none;
        }

        .folder-progress.active {
            display: block;
        }

        .folder-progress .track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            overflow: hidden;
        }

        .folder-progress .track .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .folder-progress .info {
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(20px);
            padding: 14px 24px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            display: none;
            z-index: 999;
            max-width: 90%;
            text-align: center;
            animation: slideUp 0.4s ease;
        }

        .toast.show {
            display: block;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .folder-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .folder-card {
                padding: 12px 10px;
            }
            .folder-card .folder-name {
                font-size: 13px;
            }
            .btn-folder {
                font-size: 12px;
                padding: 8px 10px;
                min-height: 38px;
            }
            .stats-bar {
                flex-wrap: wrap;
                gap: 8px;
                padding: 10px 14px;
            }
            .stats-bar .stat {
                font-size: 11px;
            }
        }

        @media (max-width: 380px) {
            .folder-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <div class="container">

        <!-- HEADER -->
        <div class="header">
            <div class="logo">🦍</div>
            <div class="title-group">
                <h1>BD Punks Layers</h1>
                <div class="sub">ফোল্ডার ভিত্তিক ডাউনলোড</div>
            </div>
        </div>

        <!-- STATS -->
        <div class="stats-bar" id="statsBar">
            <div class="stat">📁 ফোল্ডার: <span class="num" id="totalFolders">—</span></div>
            <div class="stat">📄 ফাইল: <span class="num" id="totalFiles">—</span></div>
            <div class="stat">💾 সাইজ: <span class="num" id="totalSize">—</span></div>
        </div>

        <!-- FOLDER GRID -->
        <div class="folder-grid" id="folderGrid"></div>

        <!-- FOOTER -->
        <div style="text-align:center;margin-top:30px;color:rgba(255,255,255,0.06);font-size:11px;">
            ⚡ প্রতিটি ফোল্ডার আলাদাভাবে ডাউনলোড করুন
        </div>

    </div>

    <script>
        // ================================================================
        //  LAYER DATA
        // ================================================================

        const BASE_URL = 'https://firebasestorage.googleapis.com/v0/b/bdpunks.firebasestorage.app/o/';

        const LAYERS = {
            '1_Background': {
                files: ['Background'],
                label: 'ব্যাকগ্রাউন্ড'
            },
            '2_Base': {
                files: ['Male', 'Female', 'Zombie', 'Ape', 'Alien'],
                label: 'বেস টাইপ'
            },
            '3_Nose': {
                files: ['Clown Nose'],
                label: 'নাক'
            },
            '4_Face': {
                files: ['Spots', 'Mole', 'Rosy Cheeks', 'Frown', 'Smile', 'Buck Teeth', 'Eye Mask', 'Medical Mask',
                    'Clown Eyes Blue', 'Clown Eyes Green'
                ],
                label: 'মুখের বৈশিষ্ট্য'
            },
            '5_Neck': {
                files: ['Choker', 'Gold Chain', 'Silver Chain'],
                label: 'গলার অলঙ্কার'
            },
            '6_Mouth': {
                files: ['Smile', 'Frown', 'Black Lipstick', 'Hot Lipstick', 'Purple Lipstick', 'Pipe', 'Cigarette',
                    'Vape'
                ],
                label: 'মুখ/ঠোঁট'
            },
            '7_Ear': {
                files: ['Earring'],
                label: 'কান'
            },
            '8_Beard': {
                files: ['Big Beard', 'Chinstrap', 'Goat', 'Handlebars', 'Luxurious Beard', 'Mustache', 'Muttonchops',
                    'Normal Beard', 'Normal Beard Black', 'Shadow Beard', 'Front Beard', 'Front Beard Dark'
                ],
                label: 'দাড়ি (পুরুষ)'
            },
            '9_Accessory': {
                files: ['Bandana', 'Do-rag', 'Hoodie', 'Eye Patch', 'Medical Mask', 'VR', '3D Glasses',
                    'Welding Goggles', 'Cigarette', 'Vape', 'Pipe'
                ],
                label: 'অ্যাকসেসরি'
            },
            '10_Head': {
                files: ['3D Glasses', 'Bandana', 'Beanie', 'Big Shades', 'Blonde Bob', 'Blonde Short', 'Cap',
                    'Cap Forward', 'Clown Hair Green', 'Cowboy Hat', 'Crazy Hair', 'Dark Hair', 'Do-rag', 'Fedora',
                    'Frumpy Hair', 'Half Shaved', 'Headband', 'Hoodie', 'Horned Rim Glasses', 'Knitted Cap',
                    'Messy Hair', 'Mohawk', 'Mohawk Dark', 'Mohawk Thin', 'Orange Side', 'Peak Spike', 'Pigtails',
                    'Pink With Hat', 'Pilot Helmet', 'Police Cap', 'Purple Hair', 'Red Mohawk', 'Shaved Head',
                    'Straight Hair', 'Straight Hair Blonde', 'Straight Hair Dark', 'Stringy Hair', 'Tassle Hat',
                    'Tiara', 'Top Hat', 'Vampire Hair', 'Wild Blonde', 'Wild Hair', 'Wild White Hair'
                ],
                label: 'মাথা/চুল'
            },
            '11_Eyes': {
                files: ['Big Shades', 'Classic Shades', 'Clown Eyes Blue', 'Clown Eyes Green', 'Horned Rim Glasses',
                    'Nerd Glasses', 'Regular Shades', 'Small Shades', 'VR', '3D Glasses', 'Welding Goggles',
                    'Eye Mask', 'Eye Patch', 'Blue Eye Shadow', 'Green Eye Shadow', 'Purple Eye Shadow'
                ],
                label: 'চোখ'
            }
        };

        // ================================================================
        //  BUILD FILE LIST
        // ================================================================

        function getFolderFiles(folderName) {
            const items = LAYERS[folderName].files;
            return items.map(item => ({
                name: item,
                path: `layers/${folderName}/${item}.png`,
                url: `${BASE_URL}layers%2F${folderName}%2F${item}.png?alt=media`
            }));
        }

        function getAllFiles() {
            const all = [];
            for (const [folder, data] of Object.entries(LAYERS)) {
                for (const item of data.files) {
                    all.push({
                        folder: folder,
                        name: item,
                        path: `layers/${folder}/${item}.png`,
                        url: `${BASE_URL}layers%2F${folder}%2F${item}.png?alt=media`
                    });
                }
            }
            return all;
        }

        // ================================================================
        //  DOM REFS
        // ================================================================
        const grid = document.getElementById('folderGrid');
        const totalFoldersEl = document.getElementById('totalFolders');
        const totalFilesEl = document.getElementById('totalFiles');
        const totalSizeEl = document.getElementById('totalSize');
        const toast = document.getElementById('toast');

        let activeDownloads = {};

        // ================================================================
        //  TOAST
        // ================================================================
        function showToast(msg, duration = 3000) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), duration);
        }

        // ================================================================
        //  DOWNLOAD SINGLE FOLDER
        // ================================================================
        async function downloadFolder(folderName) {
            if (activeDownloads[folderName]) return;
            activeDownloads[folderName] = true;

            const btn = document.getElementById(`btn-${folderName}`);
            const progress = document.getElementById(`progress-${folderName}`);
            const fill = document.getElementById(`fill-${folderName}`);
            const info = document.getElementById(`info-${folderName}`);

            btn.disabled = true;
            btn.classList.add('loading');
            progress.classList.add('active');
            fill.style.width = '0%';
            info.textContent = '⏳ শুরু হচ্ছে...';

            const files = getFolderFiles(folderName);
            const total = files.length;
            let completed = 0;
            let downloadedBytes = 0;
            const startTime = Date.now();

            try {
                const zip = new JSZip();
                const concurrency = 5;
                const queue = [...files];
                let active = 0;

                await new Promise((resolve, reject) => {
                    function next() {
                        if (queue.length === 0 && active === 0) {
                            resolve();
                            return;
                        }

                        while (active < concurrency && queue.length > 0) {
                            const file = queue.shift();
                            active++;

                            fetch(file.url)
                                .then(res => {
                                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                                    return res.blob();
                                })
                                .then(blob => {
                                    zip.file(file.path, blob);
                                    downloadedBytes += blob.size;
                                    completed++;

                                    const pct = Math.round((completed / total) * 100);
                                    fill.style.width = pct + '%';
                                    info.textContent = `⏳ ${completed}/${total} (${pct}%)`;

                                    if (completed === total) {
                                        info.textContent = '📦 জিপ তৈরি হচ্ছে...';
                                    }
                                })
                                .catch(err => {
                                    info.textContent = `⚠️ ${file.name} failed`;
                                })
                                .finally(() => {
                                    active--;
                                    next();
                                });
                        }
                    }

                    next();
                });

                info.textContent = '📦 জিপ ফাইল তৈরি হচ্ছে...';

                const zipBlob = await zip.generateAsync({ type: 'blob' });
                const zipName = `${folderName}.zip`;

                // Download
                const link = document.createElement('a');
                link.href = URL.createObjectURL(zipBlob);
                link.download = zipName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(() => URL.revokeObjectURL(link.href), 10000);

                const elapsed = (Date.now() - startTime) / 1000;
                const sizeMB = (zipBlob.size / (1024 * 1024)).toFixed(1);

                fill.style.width = '100%';
                info.textContent = `✅ সম্পূর্ণ! (${sizeMB} MB, ${elapsed.toFixed(1)}s)`;
                showToast(`✅ ${folderName} ডাউনলোড সম্পূর্ণ!`, 2500);

            } catch (error) {
                info.textContent = `❌ ${error.message}`;
                showToast(`❌ ${folderName} ডাউনলোড ব্যর্থ`, 3000);
            } finally {
                activeDownloads[folderName] = false;
                btn.disabled = false;
                btn.classList.remove('loading');
            }
        }

        // ================================================================
        //  RENDER FOLDERS
        // ================================================================

        function renderFolders() {
            const allFiles = getAllFiles();
            const folderNames = Object.keys(LAYERS);
            let totalSize = 0;

            // Calculate total size (estimation)
            for (const f of folderNames) {
                totalSize += LAYERS[f].files.length * 0.15;
            }

            totalFoldersEl.textContent = folderNames.length;
            totalFilesEl.textContent = allFiles.length;
            totalSizeEl.textContent = totalSize.toFixed(1) + ' MB';

            let html = '';
            for (const [folder, data] of Object.entries(LAYERS)) {
                const count = data.files.length;
                const label = data.label || '';

                html += `
                    <div class="folder-card">
                        <div class="folder-header">
                            <div class="folder-name">📁 ${folder} <span class="num">(${count})</span></div>
                            <div class="folder-size">${(count * 0.15).toFixed(1)} MB</div>
                        </div>
                        <div class="folder-desc">${label}</div>

                        <button class="btn-folder" id="btn-${folder}" onclick="downloadFolder('${folder}')">
                            <span class="icon">⬇️</span>
                            <span class="btn-label">ডাউনলোড</span>
                            <span class="spinner-sm"></span>
                        </button>

                        <div class="folder-progress" id="progress-${folder}">
                            <div class="track">
                                <div class="fill" id="fill-${folder}"></div>
                            </div>
                            <div class="info" id="info-${folder}">প্রস্তুত...</div>
                        </div>
                    </div>
                `;
            }

            grid.innerHTML = html;
        }

        // ================================================================
        //  INIT
        // ================================================================

        renderFolders();

        // মোবাইল চেক
        if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            console.log('📱 মোবাইল ডিভাইস');
        }
    </script>

</body>
</html>
